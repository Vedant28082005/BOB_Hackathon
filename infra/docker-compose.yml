version: "3.9"

# Load .env from same directory


x-backend-env: &backend-env
  DATABASE_URL: "postgresql+asyncpg://trustlayer:trustlayer@postgres:5432/trustlayer"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "trustlayer_neo4j"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_ACCESS_KEY: "trustlayer_minio"
  MINIO_SECRET_KEY: "trustlayer_minio_secret"
  MINIO_BUCKET: "trustlayer-kyc"
  ML_SERVICE_URL: "http://ml-service:8001"
  ML_SERVICE_API_KEY: "internal_api_key_dev"
  GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
  ENVIRONMENT: "development"
  DEBUG: "true"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trustlayer
      POSTGRES_PASSWORD: trustlayer
      POSTGRES_DB: trustlayer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustlayer"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5.19-community
    environment:
      NEO4J_AUTH: "neo4j/trustlayer_neo4j"
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,algo.*"
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "trustlayer_neo4j", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: trustlayer_minio
      MINIO_ROOT_PASSWORD: trustlayer_minio_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── ML Inference Service ─────────────────────────────────────────────────────
  ml-service:
    build:
      context: ../ml-service
      dockerfile: Dockerfile
    environment:
      INTERNAL_API_KEY: "internal_api_key_dev"
      USE_GPU: "${USE_GPU:-false}"
    volumes:
      - ../ml-service/model_weights:/app/model_weights:ro
      - ml_model_cache:/root/.insightface   # cache downloaded InsightFace models
    ports:
      - "8001:8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s   # model download + load can take 2 min on first boot

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
      ml-service:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./geoip:/app/data:ro  # mount GeoLite2 DB here
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A tasks.assessment_pipeline.celery_app worker --loglevel=info --concurrency=4
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started

  # ── Celery Beat (scheduled tasks: media purge, etc.) ─────────────────────────
  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A tasks.assessment_pipeline.celery_app beat --loglevel=info
    environment:
      <<: *backend-env
    depends_on:
      - redis

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── Observability ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: trustlayer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  minio_data:
  prometheus_data:
  grafana_data:
  ml_model_cache:
