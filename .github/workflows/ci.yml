name: TrustLayer CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/ ml-service/ --ignore E501

  test-backend:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: pip install -r backend/requirements.txt pytest pytest-asyncio
      - name: Install ml-service deps (CPU only)
        run: |
          pip install paddlepaddle==2.6.1 paddleocr==2.7.3 \
                      opencv-python-headless pillow piexif \
                      numpy timm torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run lint --prefix frontend || true
      - run: npm run build --prefix frontend

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, lint-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: trustlayer/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build ml-service image (CPU only in CI)
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          push: false
          tags: trustlayer/ml-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
